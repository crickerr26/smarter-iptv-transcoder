services:
  - type: web
    name: smarter-iptv-transcoder
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: CORS_ORIGIN
        value: https://main.smarter-iptv.pages.dev
      - key: LOW_CPU_MODE
        value: "true"
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ACCESS_TOKEN
        generateValue: true
