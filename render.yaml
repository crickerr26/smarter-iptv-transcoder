services:
  - type: web
    name: smarter-iptv-transcoder
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: CORS_ORIGIN
        value: "*"
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ACCESS_TOKEN
        generateValue: true
